spring.application.name=emr
spring.datasource.url=jdbc:postgresql://localhost:5432/emr_db
spring.datasource.username=godreigns
spring.datasource.password=godreigns

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable security
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Logging - Enable security logging for debugging
#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.http.converter.json=DEBUG
#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.web.cors=DEBUG
#logging.level.hospital.emr.security=DEBUG
logging.level.root=INFO

# CORS Configuration
cors.allowed-origins=*
cors.allowed-methods=*
cors.allowed-headers=*
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=*
spring.mvc.cors.allowed-headers=*

# JWT Configuration - Increase expiration time
security.jwt.secret-key=ZmFrZV9yYW5kb21fbHlyaWNfYXV0aF9rZXlfZm9yX2Vtcl9wcm9qZWN0
security.jwt.expiration-ms=86400000
security.jwt.refresh-expiration-ms=604800000
security.jwt.clock-skew-seconds=300

# MapStruct Configuration
mapstruct.defaultComponentModel=spring
mapstruct.unmappedTargetPolicy=WARN
mapstruct.unmappedSourcePolicy=IGNORE
mapstruct.disableBuilders=false

# Enable server-side SSL
server.ssl.enabled=false
server.address=0.0.0.0
server.port=8080

# Session configuration
server.servlet.session.timeout=1800
spring.session.timeout=1800

# WebSocket configuration
spring.websocket.allowed-origins=*